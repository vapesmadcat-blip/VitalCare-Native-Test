name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm install

      - run: npx cap init "VitalCare" com.vitalcare.medcontrol --web-dir=www
      - run: npx cap add android

      - name: Copy native
        run: |
          mkdir -p android/app/src/main/java/com/vitalcare/medcontrol
          cp -r native/android/app/src/main/java/com/vitalcare/medcontrol/* android/app/src/main/java/com/vitalcare/medcontrol/

      - name: Copy manifest
        run: |
          cp native/android/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - run: npx cap sync android

      - run: chmod +x android/gradlew
      - run: cd android && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
